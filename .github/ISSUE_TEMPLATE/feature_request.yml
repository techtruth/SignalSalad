name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Preferred behavior and constraints
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
