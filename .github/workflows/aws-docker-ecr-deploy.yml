name: AWS Docker ECR Deploy

on:
  push:
    tags:
      - aws-docker-deploy
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: aws-docker-ecr-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-docker-images:
    name: Build and Push Signaling/Media Images to ECR
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ECR_SIGNALING_REPOSITORY: ${{ secrets.AWS_ECR_SIGNALING_REPOSITORY }}
      AWS_ECR_MEDIA_REPOSITORY: ${{ secrets.AWS_ECR_MEDIA_REPOSITORY }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AWS secrets
        run: |
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "Missing secret: AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "Missing secret: AWS_SECRET_ACCESS_KEY"; exit 1; }

      - name: Verify ECR repository secrets
        run: |
          test -n "${AWS_ECR_SIGNALING_REPOSITORY}" || { echo "Missing secret: AWS_ECR_SIGNALING_REPOSITORY"; exit 1; }
          test -n "${AWS_ECR_MEDIA_REPOSITORY}" || { echo "Missing secret: AWS_ECR_MEDIA_REPOSITORY"; exit 1; }

      - name: Login to ECR
        run: |
          ECR_REGISTRY="$(echo "${AWS_ECR_SIGNALING_REPOSITORY}" | cut -d'/' -f1)"
          AWS_ECR_REGION="$(echo "${ECR_REGISTRY}" | cut -d'.' -f4)"

          test -n "${ECR_REGISTRY}" || { echo "Could not parse ECR registry from AWS_ECR_SIGNALING_REPOSITORY"; exit 1; }
          test -n "${AWS_ECR_REGION}" || { echo "Could not parse ECR region from ${ECR_REGISTRY}"; exit 1; }

          aws ecr get-login-password --region "${AWS_ECR_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Build and push signaling image
        run: |
          docker build \
            -f containerization/Dockerfile.signaling \
            -t "${AWS_ECR_SIGNALING_REPOSITORY}:latest" \
            -t "${AWS_ECR_SIGNALING_REPOSITORY}:${GITHUB_SHA}" \
            .

          docker push "${AWS_ECR_SIGNALING_REPOSITORY}:latest"
          docker push "${AWS_ECR_SIGNALING_REPOSITORY}:${GITHUB_SHA}"

      - name: Build and push media image
        run: |
          docker build \
            -f containerization/Dockerfile.media \
            -t "${AWS_ECR_MEDIA_REPOSITORY}:latest" \
            -t "${AWS_ECR_MEDIA_REPOSITORY}:${GITHUB_SHA}" \
            .

          docker push "${AWS_ECR_MEDIA_REPOSITORY}:latest"
          docker push "${AWS_ECR_MEDIA_REPOSITORY}:${GITHUB_SHA}"
