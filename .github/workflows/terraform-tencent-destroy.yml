name: Terraform Tencent Destroy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-tencent-destroy
  cancel-in-progress: false

jobs:
  destroy-tencent:
    name: Destroy Tencent Terraform
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_STATE_S3_BUCKET: ${{ secrets.TF_STATE_S3_BUCKET }}
      TF_STATE_AWS_REGION: ${{ secrets.TF_STATE_AWS_REGION }}
      TF_STATE_AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_AWS_ACCESS_KEY_ID }}
      TF_STATE_AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_AWS_SECRET_ACCESS_KEY }}
      TF_STATE_AWS_SESSION_TOKEN: ${{ secrets.TF_STATE_AWS_SESSION_TOKEN }}
      TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
    defaults:
      run:
        shell: bash
        working-directory: infrastructure/tencent
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Verify Tencent secrets
        run: |
          test -n "${TENCENTCLOUD_SECRET_ID}" || { echo "Missing secret: TENCENTCLOUD_SECRET_ID"; exit 1; }
          test -n "${TENCENTCLOUD_SECRET_KEY}" || { echo "Missing secret: TENCENTCLOUD_SECRET_KEY"; exit 1; }

      - name: Verify S3 backend secrets
        run: |
          test -n "${TF_STATE_S3_BUCKET}" || { echo "Missing secret: TF_STATE_S3_BUCKET"; exit 1; }
          test -n "${TF_STATE_AWS_REGION}" || { echo "Missing secret: TF_STATE_AWS_REGION"; exit 1; }
          test -n "${TF_STATE_AWS_ACCESS_KEY_ID}" || { echo "Missing secret: TF_STATE_AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${TF_STATE_AWS_SECRET_ACCESS_KEY}" || { echo "Missing secret: TF_STATE_AWS_SECRET_ACCESS_KEY"; exit 1; }

      - name: Terraform Init (S3 backend)
        run: |
          cat > backend.ci.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

          backend_args=(
            "-backend-config=bucket=${TF_STATE_S3_BUCKET}"
            "-backend-config=key=signalsalad/tencent/terraform.tfstate"
            "-backend-config=region=${TF_STATE_AWS_REGION}"
            "-backend-config=encrypt=true"
            "-backend-config=access_key=${TF_STATE_AWS_ACCESS_KEY_ID}"
            "-backend-config=secret_key=${TF_STATE_AWS_SECRET_ACCESS_KEY}"
          )
          if [[ -n "${TF_STATE_AWS_SESSION_TOKEN:-}" ]]; then
            backend_args+=("-backend-config=session_token=${TF_STATE_AWS_SESSION_TOKEN}")
          fi
          if [[ -n "${TF_STATE_DYNAMODB_TABLE:-}" ]]; then
            backend_args+=("-backend-config=dynamodb_table=${TF_STATE_DYNAMODB_TABLE}")
          fi

          terraform init -input=false -reconfigure "${backend_args[@]}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Destroy
        run: terraform destroy -input=false -lock-timeout=5m -auto-approve
