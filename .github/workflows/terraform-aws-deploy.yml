name: Terraform AWS Tag Deploy

on:
  push:
    tags:
      - aws-deploy
  workflow_dispatch:
  workflow_call:
    outputs:
      webapp_assets_bucket:
        description: "S3 bucket name for webapp assets"
        value: ${{ jobs.deploy-aws.outputs.webapp_assets_bucket }}
      webapp_cdn_distribution_id:
        description: "CloudFront distribution ID for webapp CDN"
        value: ${{ jobs.deploy-aws.outputs.webapp_cdn_distribution_id }}
      ecr_signaling_repository:
        description: "ECR repository URL for signaling image"
        value: ${{ jobs.deploy-aws.outputs.ecr_signaling_repository }}
      ecr_media_repository:
        description: "ECR repository URL for media image"
        value: ${{ jobs.deploy-aws.outputs.ecr_media_repository }}

permissions:
  contents: read
  actions: write

concurrency:
  group: terraform-aws-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-aws:
    name: Deploy AWS Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      webapp_assets_bucket: ${{ steps.tf_outputs.outputs.webapp_assets_bucket }}
      webapp_cdn_distribution_id: ${{ steps.tf_outputs.outputs.webapp_cdn_distribution_id }}
      ecr_signaling_repository: ${{ steps.tf_outputs.outputs.ecr_signaling_repository }}
      ecr_media_repository: ${{ steps.tf_outputs.outputs.ecr_media_repository }}
    env:
      TF_IN_AUTOMATION: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_S3_BUCKET: mediasalad-demo
      TF_STATE_AWS_REGION: us-east-1
      TF_STATE_DYNAMODB_TABLE: mediasalad
    defaults:
      run:
        shell: bash
        working-directory: infrastructure/aws
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Verify AWS secrets
        run: |
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "Missing secret: AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "Missing secret: AWS_SECRET_ACCESS_KEY"; exit 1; }

      - name: Verify S3 backend secrets
        run: |
          test -n "${TF_STATE_S3_BUCKET}" || { echo "Missing secret: TF_STATE_S3_BUCKET"; exit 1; }
          test -n "${TF_STATE_AWS_REGION}" || { echo "Missing env: TF_STATE_AWS_REGION"; exit 1; }
          test -n "${TF_STATE_DYNAMODB_TABLE}" || { echo "Missing env: TF_STATE_DYNAMODB_TABLE"; exit 1; }

      - name: Terraform Init (S3 backend)
        run: |
          cat > backend.ci.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

          backend_args=(
            "-backend-config=bucket=${TF_STATE_S3_BUCKET}"
            "-backend-config=key=signalsalad/aws/terraform.tfstate"
            "-backend-config=region=${TF_STATE_AWS_REGION}"
            "-backend-config=encrypt=true"
            "-backend-config=dynamodb_table=${TF_STATE_DYNAMODB_TABLE}"
            "-backend-config=access_key=${AWS_ACCESS_KEY_ID}"
            "-backend-config=secret_key=${AWS_SECRET_ACCESS_KEY}"
          )

          terraform init -input=false -reconfigure "${backend_args[@]}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=5m -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs for downstream workflows
        id: tf_outputs
        run: |
          echo "webapp_assets_bucket=$(terraform output -raw webapp_assets_bucket_name)" >> "${GITHUB_OUTPUT}"
          echo "webapp_cdn_distribution_id=$(terraform output -raw webapp_cdn_distribution_id)" >> "${GITHUB_OUTPUT}"
          echo "ecr_signaling_repository=$(terraform output -json ecr_repositories | jq -r '.signaling')" >> "${GITHUB_OUTPUT}"
          echo "ecr_media_repository=$(terraform output -json ecr_repositories | jq -r '.media')" >> "${GITHUB_OUTPUT}"
