name: Terraform AWS Tag Deploy

on:
  push:
    tags:
      - aws-deploy
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-aws-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-aws:
    name: Deploy AWS Terraform
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_S3_BUCKET: mediasalad-demo
      TF_STATE_AWS_REGION: us-east-1
      TF_STATE_DYNAMODB_TABLE: mediasalad
    defaults:
      run:
        shell: bash
        working-directory: infrastructure/aws
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Verify AWS secrets
        run: |
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "Missing secret: AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "Missing secret: AWS_SECRET_ACCESS_KEY"; exit 1; }

      - name: Verify S3 backend secrets
        run: |
          test -n "${TF_STATE_S3_BUCKET}" || { echo "Missing secret: TF_STATE_S3_BUCKET"; exit 1; }
          test -n "${TF_STATE_AWS_REGION}" || { echo "Missing env: TF_STATE_AWS_REGION"; exit 1; }
          test -n "${TF_STATE_DYNAMODB_TABLE}" || { echo "Missing env: TF_STATE_DYNAMODB_TABLE"; exit 1; }

      - name: Terraform Init (S3 backend)
        run: |
          cat > backend.ci.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

          backend_args=(
            "-backend-config=bucket=${TF_STATE_S3_BUCKET}"
            "-backend-config=key=signalsalad/aws/terraform.tfstate"
            "-backend-config=region=${TF_STATE_AWS_REGION}"
            "-backend-config=encrypt=true"
            "-backend-config=dynamodb_table=${TF_STATE_DYNAMODB_TABLE}"
            "-backend-config=access_key=${AWS_ACCESS_KEY_ID}"
            "-backend-config=secret_key=${AWS_SECRET_ACCESS_KEY}"
          )

          terraform init -input=false -reconfigure "${backend_args[@]}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=5m -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
