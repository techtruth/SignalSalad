name: AWS Webapp CDN Deploy

on:
  push:
    tags:
      - aws-webapp-deploy
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: aws-webapp-cdn-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-webapp-cdn:
    name: Build and Publish Webapp to S3/CDN
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_WEBAPP_ASSETS_BUCKET: ${{ secrets.AWS_WEBAPP_ASSETS_BUCKET }}
      AWS_WEBAPP_CDN_DISTRIBUTION_ID: ${{ secrets.AWS_WEBAPP_CDN_DISTRIBUTION_ID }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AWS secrets
        run: |
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "Missing secret: AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "Missing secret: AWS_SECRET_ACCESS_KEY"; exit 1; }

      - name: Verify webapp deploy secrets
        run: |
          test -n "${AWS_WEBAPP_ASSETS_BUCKET}" || { echo "Missing secret: AWS_WEBAPP_ASSETS_BUCKET"; exit 1; }
          test -n "${AWS_WEBAPP_CDN_DISTRIBUTION_ID}" || { echo "Missing secret: AWS_WEBAPP_CDN_DISTRIBUTION_ID"; exit 1; }

      - name: Setup Node for webapp build
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Build webapp dist
        working-directory: webapp
        run: |
          npm ci
          node server.js --mode production

      - name: Upload webapp to S3
        run: |
          test -f "webapp/dist/index.html" || { echo "Missing webapp build output: webapp/dist/index.html"; exit 1; }

          aws s3 sync webapp/dist "s3://${AWS_WEBAPP_ASSETS_BUCKET}" --delete --exclude "index.html"
          aws s3 cp webapp/dist/index.html "s3://${AWS_WEBAPP_ASSETS_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${AWS_WEBAPP_CDN_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Print webapp URL
        run: |
          WEBAPP_CDN_DOMAIN="$(aws cloudfront get-distribution --id "${AWS_WEBAPP_CDN_DISTRIBUTION_ID}" --query 'Distribution.DomainName' --output text)"
          echo "Webapp URL: https://${WEBAPP_CDN_DOMAIN}"
