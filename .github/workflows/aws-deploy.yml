name: AWS Deploy

on:
  push:
    branches:
      - main
    tags:
      - aws-full-deploy
  workflow_dispatch:
    inputs:
      run_terraform_deploy:
        description: Run Terraform apply
        required: true
        type: boolean
        default: true
      run_docker_deploy:
        description: Run Docker ECR build + push
        required: true
        type: boolean
        default: true
      run_webapp_deploy:
        description: Run webapp build + CDN publish
        required: true
        type: boolean
        default: true
      run_terraform_destroy:
        description: Run Terraform destroy
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

concurrency:
  group: aws-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  terraform_deploy:
    name: Provision AWS Infrastructure
    if: ${{ github.event_name == 'push' || inputs.run_terraform_deploy }}
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/aws-terraform-provision.yml
    secrets: inherit

  docker_images:
    name: Publish Docker Images
    needs: terraform_deploy
    if: >-
      ${{
        (github.event_name == 'push' || inputs.run_docker_deploy) &&
        (needs.terraform_deploy.result == 'success' || needs.terraform_deploy.result == 'skipped')
      }}
    uses: ./.github/workflows/aws-docker-ecr-publish.yml
    with:
      ecr_signaling_repository: ${{ needs.terraform_deploy.result == 'success' && needs.terraform_deploy.outputs.ecr_signaling_repository || '' }}
      ecr_media_repository: ${{ needs.terraform_deploy.result == 'success' && needs.terraform_deploy.outputs.ecr_media_repository || '' }}
    secrets: inherit

  webapp:
    name: Publish Webapp Assets
    needs:
      - terraform_deploy
      - docker_images
    if: >-
      ${{
        (github.event_name == 'push' || inputs.run_webapp_deploy) &&
        (needs.terraform_deploy.result == 'success' || needs.terraform_deploy.result == 'skipped') &&
        (needs.docker_images.result == 'success' || needs.docker_images.result == 'skipped')
      }}
    uses: ./.github/workflows/aws-webapp-cdn-publish.yml
    with:
      webapp_assets_bucket: ${{ needs.terraform_deploy.result == 'success' && needs.terraform_deploy.outputs.webapp_assets_bucket || '' }}
      webapp_cdn_distribution_id: ${{ needs.terraform_deploy.result == 'success' && needs.terraform_deploy.outputs.webapp_cdn_distribution_id || '' }}
    secrets: inherit

  terraform_destroy:
    name: Destroy AWS Infrastructure
    needs:
      - terraform_deploy
      - docker_images
      - webapp
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        inputs.run_terraform_destroy &&
        (needs.terraform_deploy.result == 'success' || needs.terraform_deploy.result == 'skipped') &&
        (needs.docker_images.result == 'success' || needs.docker_images.result == 'skipped') &&
        (needs.webapp.result == 'success' || needs.webapp.result == 'skipped')
      }}
    uses: ./.github/workflows/aws-terraform-destroy.yml
    secrets: inherit
